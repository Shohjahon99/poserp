name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy web assets to Android
        run: |
          rm -rf frontend/android/app/src/main/assets/public
          mkdir -p frontend/android/app/src/main/assets/public
          cp -r frontend/dist/. frontend/android/app/src/main/assets/public/
          cp frontend/capacitor.config.json frontend/android/app/src/main/assets/capacitor.config.json

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > frontend/android/local.properties

      - name: Make Gradle executable
        run: chmod +x frontend/android/gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -50

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: POS-ERP-Android
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
