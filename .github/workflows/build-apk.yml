name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platforms
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install frontend deps
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x frontend/android/gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle-build.log
          echo "=== APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: POS-ERP-Android
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 7
